name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [none, asan, ubsan]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build
      - name: Configure
        run: |
          cmake -S projects/ash -B projects/ash/build -G Ninja                 -DCMAKE_BUILD_TYPE=Release                 -DASH_ENABLE_ASAN=${{ matrix.sanitizer == 'asan' && 'ON' || 'OFF' }}                 -DASH_ENABLE_UBSAN=${{ matrix.sanitizer == 'ubsan' && 'ON' || 'OFF' }}
      - name: Build
        run: cmake --build projects/ash/build -j
      - name: Test
        run: ctest --test-dir projects/ash/build --output-on-failure
